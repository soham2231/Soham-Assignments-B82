<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Str Operation</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <style>
      button {
        margin: 10px;
      }
      textarea {
        border-radius: 8px;
        height: 50%;
        width: 50%;
        display: flex;
        justify-self: center;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <header class="text-secondary display-3 text-center">
      Strings Operation
    </header>
    <!-- <div class="container-fluid m-5">
      <input
        type="text"
        id="inputText"
        class="form-control w-50 m-auto"
        placeholder="Enter Paragraph Here"
      />
    </div> -->
    <div class="container-fluid mt-4">
      <div class="form-floating">
        <textarea
          class="form-control"
          placeholder="Enter Your Paragraph"
          id="inputText"
          style="height: 100px"
        ></textarea>
      </div>
      <div class="container-fluid m-4 text-center">
        <textarea name="result" id="res">Result</textarea>
      </div>
    </div>

    <div class="container m-5">
      <button type="button" class="btn btn-outline-dark" onclick="countVow()">
        Check Vowels
      </button>
      <button type="button" class="btn btn-outline-dark" onclick="countCons()">
        Check Consonants
      </button>
      <button type="button" class="btn btn-outline-dark" onclick="countSpc()">
        Count Spaces
      </button>
      <button
        type="button"
        class="btn btn-outline-dark"
        onclick="countNewLine()"
      >
        Count New Lines
      </button>
      <button type="button" class="btn btn-outline-dark" onclick="countWords()">
        Count Words
      </button>
      <button type="button" class="btn btn-outline-dark" onclick="countChar()">
        Count Characters
      </button>
      <button
        type="button"
        class="btn btn-outline-dark"
        onclick="countSentences()"
      >
        Count Sentences
      </button>
      <button
        type="button"
        class="btn btn-outline-dark"
        onclick="toLowercase()"
      >
        Convert to LowerCase
      </button>
      <button
        type="button"
        class="btn btn-outline-dark"
        onclick="toUppercase()"
      >
        Capitalize
      </button>
      <button type="button" class="btn btn-outline-dark" onclick="titleCase()">
        Title Case
      </button>
      <button type="button" class="btn btn-outline-dark">
        Check Palindrome
      </button>
      <button type="button" class="btn btn-outline-dark">
        Extract First Words
      </button>
      <button type="button" class="btn btn-outline-dark">
        Replace all Spaces with Hyphens
      </button>
      <button type="button" class="btn btn-outline-dark">
        Reverse the Characters
      </button>
      <button type="button" class="btn btn-outline-dark">
        Reverse the Words
      </button>
      <button type="button" class="btn btn-outline-dark">
        Sort the Characters
      </button>
      <button type="button" class="btn btn-outline-dark">Sort the words</button>
      <button
        type="button"
        class="btn btn-outline-dark"
        onclick="longestWord()"
      >
        Longest Word
      </button>
    </div>

    <script src="str.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
      crossorigin="anonymous"
    ></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignment 3</title>

<style>

/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* Background */
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(to right, #fbd786, #f7797d);
}

/* Card */
.card{
    width:85%;
    max-width:1100px;
    background:white;
    border-radius:15px;
    box-shadow:0 20px 40px rgba(0,0,0,0.2);
    padding:60px;
    position:relative;
    display:flex;
    align-items:center;
}

/* Left Content */
.content{
    width:55%;
}

.content h1{
    font-size:42px;
    line-height:1.3;
    margin-bottom:30px;
}

/* Button */
button{
    padding:12px 28px;
    background:#ff9f00;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
    box-shadow:4px 4px 0px #ff4d4d;
}

button:hover{
    background:#e68900;
}

/* Image */
.image{
    position:absolute;
    left: 50%;
    transform: translateX(30%);
}

.image img{
    width:380px;
    height: 500px;
}

</style>
</head>

<body>

<div class="card">

    <div class="content">
        <h1>
            It's time to stand<br>
            out from the<br>
            crowd.
        </h1>

        <button>New Collection</button>
    </div>

    <div class="image">
        <img src="Gemini_Generated_Image_dqw752dqw752dqw7.png" alt="Model">
    </div>

</div>

</body>
</html>

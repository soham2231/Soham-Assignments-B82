<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive CSS Grid</title>
    <style>
      body {
        margin: 0;
        font-family: Arial;
      }

      .container {
        display: grid;
        height: 100vh;
        gap: 10px;
        padding: 10px;

        grid-template-columns: 1fr 2fr 2fr 2fr;
        grid-template-rows: 60px 200px 150px 60px;

        grid-template-areas:
          "sidebar navbar navbar navbar"
          "sidebar main main main"
          "sidebar content1 content2 content3"
          "sidebar footer footer footer";
      }

      .navbar {
        grid-area: navbar;
        background: #7ed6df;
      }

      .sidebar {
        grid-area: sidebar;
        background: #22a6b3;
      }

      .main {
        grid-area: main;
        background: #7ed6df;
      }

      .content1 {
        grid-area: content1;
        background: #b8e994;
      }

      .content2 {
        grid-area: content2;
        background: #b8e994;
      }

      .content3 {
        grid-area: content3;
        background: #b8e994;
      }

      .footer {
        grid-area: footer;
        background: #1dd1a1;
      }

      /* Responsive Layout */

      @media (max-width: 768px) {
        .container {
          grid-template-columns: 1fr;

          grid-template-areas:
            "navbar"
            "sidebar"
            "main"
            "content1"
            "content2"
            "content3"
            "footer";
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="navbar">NAVBAR</div>

      <div class="sidebar">SIDEBAR</div>

      <div class="main">MAIN</div>

      <div class="content1">CONTENT 1</div>

      <div class="content2">CONTENT 2</div>

      <div class="content3">CONTENT 3</div>

      <div class="footer">FOOTER</div>
    </div>
  </body>
</html>

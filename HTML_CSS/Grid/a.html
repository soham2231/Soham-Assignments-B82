<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Assignment 1: Basic Grid Layout</title>
    <style>
      .container {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        grid-template-rows: repeat(3, 100px);
        gap: 10px;
      }

      .box {
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
      }

      .box1 {
        background: #ff6b6b;
      } /* coral */
      .box2 {
        background: #4ecdc4;
      } /* teal */
      .box3 {
        background: #556270;
      } /* slate */
      .box4 {
        background: #c7f464;
      } /* lime */
      .box5 {
        background: #ff6f91;
      } /* pink */
      .box6 {
        background: #1a535c;
      } /* dark cyan */
      .box7 {
        background: #ff9f1c;
      } /* orange */
      .box8 {
        background: #2ec4b6;
      } /* aquamarine */
      .box9 {
        background: #3a86ff;
      } /* blue */
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box box1">1</div>
      <div class="box box2">2</div>
      <div class="box box3">3</div>
      <div class="box box4">4</div>
      <div class="box box5">5</div>
      <div class="box box6">6</div>
      <div class="box box7">7</div>
      <div class="box box8">8</div>
      <div class="box box9">9</div>
    </div>
  </body>
</html>

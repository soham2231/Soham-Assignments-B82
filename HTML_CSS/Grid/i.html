<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        margin: 0;
        background: #ddd;
        font-family: Arial;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: 300px 300px;
        gap: 10px;
        padding: 10px;
      }

      .item {
        position: relative;
        overflow: hidden;
      }

      .item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      /* shapes */

      .img1 {
        clip-path: polygon(0 0, 85% 0, 65% 100%, 0 100%);
      }

      .img2 {
        clip-path: polygon(15% 0, 100% 0, 100% 100%, 35% 100%);
      }

      .img3 {
        clip-path: polygon(0 0, 70% 0, 100% 100%, 0 100%);
      }

      .img4 {
        clip-path: polygon(30% 0, 100% 0, 100% 100%, 0 100%);
      }

      /* center text box */

      .text {
        background: #888;
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 30px;

        clip-path: polygon(20% 0, 80% 0, 100% 100%, 0 100%);
      }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="item img1">
        <img src="Assests/mo.jpg" />
      </div>

      <div class="item text">
        <h2>THIS GRID WORKS<br />IN INTERNET EXPLORER</h2>
        <p>
          Lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod
          tempor incididunt ut labore.
        </p>
      </div>

      <div class="item img2">
        <img src="Assests/bri.jpg" />
      </div>

      <div class="item img3">
        <img src="Assests/lake.jpg" />
      </div>

      <div class="item img4">
        <img src="Assests/set.jpg" />
      </div>
    </div>
  </body>
</html>

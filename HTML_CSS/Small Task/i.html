<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>10.Footer</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      /* Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      /* Footer */
      .footer {
        background: #222;
        color: #fff;
        padding-top: 40px;
      }

      /* Container */
      .footer-container {
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        padding: 0 40px;
      }

      /* Columns */
      .footer-col {
        flex: 1;
        min-width: 250px;
        margin-bottom: 20px;
      }

      .footer-col h3 {
        margin-bottom: 15px;
      }

      /* Links */
      .footer-col ul {
        list-style: none;
      }

      .footer-col ul li {
        margin: 8px 0;
      }

      .footer-col ul li a {
        text-decoration: none;
        color: #ccc;
        transition: 0.3s;
      }

      .footer-col ul li a:hover {
        color: #fff;
      }

      /* Social icons */
      .social-links a {
        display: inline-block;
        margin-right: 10px;
        font-size: 20px;
        text-decoration: none;
        color: #ccc;
        transition: 0.3s;
      }

      .social-links a:hover {
        color: #fff;
      }

      /* Bottom */
      .footer-bottom {
        text-align: center;
        padding: 15px;
        background: #111;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <footer class="footer">
      <div class="footer-container">
        <!-- About -->
        <div class="footer-col">
          <h3>About Us</h3>
          <p>We create modern and responsive websites for users worldwide.</p>
        </div>

        <!-- Links -->
        <div class="footer-col">
          <h3>Quick Links</h3>
          <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Contact</a></li>
            <li><a href="#">About</a></li>
          </ul>
        </div>

        <!-- Social -->
        <div class="footer-col">
          <h3>Follow Us</h3>
          <div class="social-links">
            <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
            <a href="#"><i class="fa-brands fa-instagram"></i></a>
            <a href="#"><i class="fa-brands fa-wikipedia-w"></i></a>
            <a href="#"><i class="fa-brands fa-internet-explorer"></i></a>
          </div>
        </div>
      </div>

      <!-- Copyright -->
      <div class="footer-bottom">
        <p>© 2026 Your Website | All Rights Reserved</p>
      </div>
    </footer>
  </body>
</html>

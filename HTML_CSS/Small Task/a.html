<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>1.Profile Card Design</title>

    <!-- Bootstrap CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      body {
        background: #f3f3f3;
      }

      .product-card {
        width: 250px;
        background: white;
        padding: 15px;
        border-radius: 8px;
        transition: 0.3s;
      }

      .product-card:hover {
        box-shadow: 0 15px 15px rgba(0, 0, 0, 0.2);
      }

      .product-img {
        height: 200px;
        width: 100%;
        object-fit: contain;
      }
      h6 {
        text-align: center;
      }
      .price {
        color: #b12704;
        font-size: 20px;
        font-weight: bold;
      }

      .bio {
        color: black;
      }
      .icon {
        font-size: 25px;
        display: flex;
        justify-content: space-evenly;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <div class="container mt-5">
      <div class="product-card">
        <img src="asset/pic.jpg.jpeg" class="img-fluid product-img" />

        <h6 class="mt-3">Soham Kadam</h6>

        <div class="bio">
          I am a B.Tech Computer Sci student in Fabtech Technical Campus. I have
          completed my diploma from SPC College Sangola.
        </div>

        <p class="icon">
          <i class="fa-brands fa-whatsapp"></i>
          <i class="fa-brands fa-x-twitter"></i>
          <i class="fa-brands fa-linkedin"></i>
        </p>
      </div>
    </div>
  </body>
</html>

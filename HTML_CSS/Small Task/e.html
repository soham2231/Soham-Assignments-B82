<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>5.Image Gallery Layouts</title>
    <style>
      .gallery {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-gap: 10px;
        justify-items: center;
      }

      .gallery img {
        width: 100%;
        height: auto;
        transition: transform 0.7s ease;
      }

      .gallery img:hover,
      .row img:hover {
        transform: scale(1.1);
      }
    </style>
  </head>
  <body>
    <div class="gallery">
      <img src="asset/g1.jpg" alt="Image 1" class="gallery-item" />
      <img src="asset/g2.jpg" alt="Image 2" class="gallery-item" />
      <img src="asset/g3.jpg" alt="Image 3" class="gallery-item" />
      <img src="asset/g4.jpg" alt="Image 4" class="gallery-item" />
      <img src="asset/g5.jpg" alt="Image 5" class="gallery-item" />
      <img src="asset/g6.jpg" alt="Image 6" class="gallery-item" />
      <img src="asset/g7.jpg" alt="Image 7" class="gallery-item" />
      <img src="asset/g8.jpg" alt="Image 8" class="gallery-item" />
      <img src="asset/g9.jpg" alt="Image 9" class="gallery-item" />
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>7.Hero Section</title>
    <style>
      /* Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      /* Hero Section */
      .hero {
        position: relative;
        height: 100vh;
        background: url("https://images.unsplash.com/photo-1503264116251-35a269479413")
          no-repeat center/cover;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: #fff;
      }

      /* Overlay */
      .overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        top: 0;
        left: 0;
      }

      /* Content */
      .hero-content {
        position: relative;
        z-index: 1;
        max-width: 600px;
      }

      /* Heading */
      .hero-content h1 {
        font-size: 40px;
        margin-bottom: 15px;
      }

      /* Paragraph */
      .hero-content p {
        font-size: 18px;
        margin-bottom: 20px;
      }

      /* Button */
      .btn {
        display: inline-block;
        padding: 12px 25px;
        background: #4facfe;
        color: #fff;
        text-decoration: none;
        border-radius: 5px;
        transition: 0.3s;
      }

      /* Hover */
      .btn:hover {
        background: #007bff;
      }
    </style>
  </head>
  <body>
    <section class="hero">
      <div class="overlay"></div>

      <div class="hero-content">
        <h1>Build Your Dream Website</h1>
        <p>Create modern and responsive websites with ease.</p>
        <a href="#" class="btn">Get Started</a>
      </div>
    </section>
  </body>
</html>

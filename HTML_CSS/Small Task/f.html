<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>6.Testimonial</title>
    <style>
      /* Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      /* Section */
      .testimonial-section {
        text-align: center;
        padding: 50px 20px;
        background: #f5f5f5;
      }

      .testimonial-section h2 {
        margin-bottom: 30px;
      }

      /* Container */
      .testimonial-container {
        display: flex;
        justify-content: center;
        gap: 20px;
        flex-wrap: wrap;
      }

      /* Card */
      .card {
        background: #fff;
        padding: 20px;
        width: 250px;
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        transition: 0.3s;
      }

      /* Hover effect */
      .card:hover {
        transform: translateY(-5px);
      }

      /* Image */
      .card img {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        margin-bottom: 10px;
      }

      /* Name */
      .card h3 {
        margin-bottom: 10px;
      }

      /* Text */
      .card p {
        font-size: 14px;
        color: #555;
        margin-bottom: 10px;
      }

      /* Stars */
      .stars {
        color: gold;
        font-size: 18px;
      }
    </style>
  </head>
  <body>
    <section class="testimonial-section">
      <h2>What Our Customers Say</h2>

      <div class="testimonial-container">
        <div class="card">
          <img src="asset/co1.png" alt="user" />
          <h3>John Doe</h3>
          <p>"Amazing service! Highly recommended."</p>
          <div class="stars">5/5</div>
        </div>

        <div class="card">
          <img src="asset/co2.png" alt="user" />
          <h3>Sarah Smith</h3>
          <p>"Great experience, will use again."</p>
          <div class="stars">4.5/5</div>
        </div>

        <div class="card">
          <img src="asset/co3.png" alt="user" />
          <h3>Alex Brown</h3>
          <p>"Very professional and fast delivery."</p>
          <div class="stars">4/5</div>
        </div>
      </div>
    </section>
  </body>
</html>

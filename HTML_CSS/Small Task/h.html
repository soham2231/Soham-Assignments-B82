<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>9.Progress Bar</title>
    <style>
      /* Reset */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      /* Container */
      .container {
        width: 350px;
      }

      /* Skill */
      .skill {
        margin: 20px 0;
      }

      .skill p {
        margin-bottom: 5px;
      }

      /* Progress background */
      .progress {
        width: 100%;
        height: 10px;
        background: #ddd;
        border-radius: 5px;
        overflow: hidden;
      }

      /* Progress bar */
      .progress-bar {
        height: 100%;
        width: 0;
        border-radius: 5px;
        animation: fill 2s forwards;
      }

      /* Different widths */
      .html {
        width: 80%;
        background: #e44d26;
      }
      .css {
        width: 70%;
        background: #264de4;
      }
      .js {
        width: 10%;
        background: #f0db4f;
      }

      /* Animation */
      @keyframes fill {
        from {
          width: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Skills</h2>

      <div class="skill">
        <p>HTML - 80%</p>
        <div class="progress">
          <div class="progress-bar html"></div>
        </div>
      </div>

      <div class="skill">
        <p>CSS - 70%</p>
        <div class="progress">
          <div class="progress-bar css"></div>
        </div>
      </div>

      <div class="skill">
        <p>JavaScript - 10%</p>
        <div class="progress">
          <div class="progress-bar js"></div>
        </div>
      </div>
    </div>
  </body>
</html>
